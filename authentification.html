<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mon_entreprise.css">
</head>
<body>
    <div class="bienvenue">
        <h1>Bienvenue</h1>
        <h4>Entrer votre numero de téléphone pour continuer</h4>
        <div class="formulaire_auth">
            <form method="" action="page_otp.html">
                <label for="telephone">Numero de telephone:</label>
                <div class="tel">
                     <input type="tel" name="telephone" id="telephone" placeholder="Ex: 0197xxxxxx" required pattern="[0-9]*">
                     <input type="submit" value="Continuer" id="unique">
                </div>     
            </form>
        </div>
        <div class="bas">
            <p>En continuant, vous aceptez nos <span style="color: blue">Conditions d'utilisation</span> et notre <span style="color: blue">Politique de Confidentialité</span></p>
        </div> 
    </div>    
</body>
</html>
