<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="page_OTP.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward" />
    <title>Code_OTP</title>
</head>
<body>
    <div class="code">
        <h1>Verification du code</h1>
        <h3>Nous vous avons envoyer un code à 4 chiffre par SMS</h3>
        <div class="otp">
            <form method="" action="">
                <input type="text"  id="nombre1"  inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,)" required>
                <input type="text"  id="nombre2" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,)" required>
                <input type="text"  id="nombre3" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,)" required>
                <input type="text"  id="nombre4" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,)" required>
            </form>
        </div>

            <button type="submit" id="entrer" onclick="window.location.href='operation.html'">Envoyer le code</button>
            <p>Vous n'avez pas reçu le code ? <a href="">Renvoyer le code</a></p>
        
            
    </div>
    
</body>
</html>
